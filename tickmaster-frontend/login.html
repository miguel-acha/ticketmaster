<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickmaster - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="alert-container"></div>

    <div class="auth-wrapper">
        <div class="glass-card auth-card">
            <h1 style="text-align: center; margin-bottom: 2rem; color: var(--primary-color)">Tickmaster</h1>

            <div class="auth-tabs">
                <div class="tab active" onclick="switchTab('login')">Ingresar</div>
                <div class="tab" onclick="switchTab('register')">Registrarse</div>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="login-user" placeholder="Tu username" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Entrar al Dashboard</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-nombre" placeholder="Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="reg-user" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:1915/servidor";

        function showNotification(message, type = 'success') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 4000);
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.tab');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Handle Login
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const res = await fetch(`${API_BASE}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('login-user').value,
                        password: document.getElementById('login-pass').value
                    })
                });

                const data = await res.json();
                if (data.status === 'OK') {
                    showNotification('¡Bienvenido!');
                    localStorage.setItem('user', JSON.stringify(data));
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showNotification(data.message || 'Error en credenciales', 'error');
                }
            } catch (err) {
                showNotification('Error de conexión con el balanceador (puerto 1915)', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar al Dashboard';
            }
        };

        // Handle Registry
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Registrando...';

            try {
                const res = await fetch(`${API_BASE}/usuarios/registrar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre: document.getElementById('reg-nombre').value,
                        username: document.getElementById('reg-user').value,
                        password: document.getElementById('reg-pass').value
                    })
                });

                const data = await res.json();
                if (data.status === 'OK') {
                    showNotification('Cuenta creada. ¡Ya puedes ingresar!');
                    switchTab('login');
                } else {
                    showNotification(data.message || 'Error al registrar', 'error');
                }
            } catch (err) {
                showNotification('Error de conexión con el servidor', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Crear Cuenta';
            }
        };

        // Check if already logged in
        if (localStorage.getItem('user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
